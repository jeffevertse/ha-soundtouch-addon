<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <!-- Behind Home Assistant Ingress the app is served under a per-session token
       path. <base> makes every relative asset/API URL resolve under it. When
       accessed directly (e.g. local docker test) ingress_path is empty → "/". -->
  <base href="{{ ingress_path }}/">
  <title>SoundTouch</title>
  <link rel="icon" type="image/png" href="static/favicon.png?v={{ version }}">
  <link rel="apple-touch-icon" href="static/icon-180.png?v={{ version }}">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── iOS semantic color tokens ───────────────────────────────────────── */
    :root {
      --bg:            #F2F2F7;
      --surface:       #FFFFFF;
      --surface2:      #F2F2F7;
      --surface3:      #E5E5EA;
      --accent:        #007AFF;
      --red:           #FF3B30;
      --green:         #34C759;
      --orange:        #FF9500;
      --label:         #000000;
      --label2:        rgba(60,60,67,0.60);
      --label3:        rgba(60,60,67,0.30);
      --separator:     rgba(60,60,67,0.29);
      --fill:          rgba(120,120,128,0.20);
      --fill2:         rgba(120,120,128,0.16);
      --nav-blur:      rgba(242,242,247,0.85);
      --sheet-bg:      #FFFFFF;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:            #000000;
        --surface:       #1C1C1E;
        --surface2:      #2C2C2E;
        --surface3:      #3A3A3C;
        --accent:        #0A84FF;
        --red:           #FF453A;
        --green:         #30D158;
        --orange:        #FF9F0A;
        --label:         #FFFFFF;
        --label2:        rgba(235,235,245,0.60);
        --label3:        rgba(235,235,245,0.30);
        --separator:     rgba(84,84,88,0.65);
        --fill:          rgba(120,120,128,0.36);
        --fill2:         rgba(120,120,128,0.32);
        --nav-blur:      rgba(28,28,30,0.85);
        --sheet-bg:      #1C1C1E;
      }
    }

    /* ── Base ────────────────────────────────────────────────────────────── */
    body {
      background: var(--bg);
      color: var(--label);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Navigation bar ──────────────────────────────────────────────────── */
    .ios-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 16px 20px 12px;
      background: var(--nav-blur);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--separator);
    }
    .ios-nav-title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0.37px;
      line-height: 1.1;
      color: var(--label);
    }


    /* ── Content area ────────────────────────────────────────────────────── */
    .ios-content {
      padding: 20px 16px;
      padding-bottom: calc(40px + env(safe-area-inset-bottom));
      max-width: 430px;
      margin: 0 auto;
    }

    /* ── Error banner ────────────────────────────────────────────────────── */
    .error-banner {
      background: rgba(255,59,48,0.12);
      border: 0.5px solid var(--red);
      color: var(--red);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      font-size: 15px;
      display: none;
    }
    .error-banner.show { display: block; }

    /* ── Now Playing card ────────────────────────────────────────────────── */
    .ios-now-playing {
      background: var(--surface);
      border-radius: 16px;
      padding: 18px 16px;
      margin-bottom: 12px;
    }
    .ios-now-playing .np-label {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--label2);
      margin-bottom: 8px;
    }
    .ios-now-playing .np-station-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      flex-shrink: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--label3);
    }
    .status-dot.playing {
      background: var(--green);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .np-station {
      font-size: 17px;
      font-weight: 600;
      color: var(--label);
      line-height: 1.3;
    }
    .np-meta {
      font-size: 15px;
      color: var(--label2);
      margin-top: 4px;
      padding-left: 16px;
    }

    /* ── Slider rows (volume + bass) ─────────────────────────────────────── */
    .ios-slider-row {
      background: var(--surface);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .slider-label {
      font-size: 13px;
      color: var(--label2);
      min-width: 66px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .slider-label svg { color: var(--label2); flex-shrink: 0; }
    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(
        to right,
        var(--accent) 0%,
        var(--accent) var(--fill-pct, 30%),
        var(--fill) var(--fill-pct, 30%),
        var(--fill) 100%
      );
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--surface);
      box-shadow: 0 2px 6px rgba(0,0,0,0.25), 0 0 0 0.5px rgba(0,0,0,0.08);
      cursor: pointer;
    }
    #bass-slider {
      background: linear-gradient(
        to right,
        var(--accent) 0%,
        var(--accent) var(--fill-pct, 50%),
        var(--fill) var(--fill-pct, 50%),
        var(--fill) 100%
      );
    }
    .slider-num {
      font-size: 15px;
      font-weight: 500;
      min-width: 28px;
      text-align: right;
      color: var(--label2);
    }

    /* ── Transport controls ──────────────────────────────────────────────── */
    .ios-transport {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 8px 0 24px;
    }
    .ios-ctrl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--fill);
      border: none;
      cursor: pointer;
      color: var(--label);
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .ios-ctrl-btn:active { transform: scale(0.93); background: var(--fill2); }
    .ios-ctrl-btn svg { width: 20px; height: 20px; }
    .ios-ctrl-btn.primary {
      width: 60px;
      height: 60px;
      background: var(--accent);
      color: #fff;
    }
    .ios-ctrl-btn.primary svg { width: 24px; height: 24px; }
    .ios-ctrl-btn.primary:active { background: var(--accent); filter: brightness(0.85); }

    /* ── iOS section / list group ────────────────────────────────────────── */
    .ios-section {
      margin-bottom: 28px;
    }
    .ios-section-header {
      font-size: 13px;
      font-weight: 400;
      color: var(--label2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0 16px 6px;
    }
    .ios-section-footer {
      font-size: 13px;
      color: var(--label2);
      padding: 6px 16px 0;
      line-height: 1.5;
    }
    .ios-list-group {
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
    }
    .ios-list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 50px;
      padding: 12px 16px;
      background: var(--surface);
    }
    .ios-list-item.tappable {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .ios-list-item.tappable:active { background: var(--fill); }
    button.ios-list-item {
      width: 100%;
      border: none;
      text-align: left;
      font-family: inherit;
      font-size: inherit;
    }
    .ios-item-icon {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .ios-item-icon svg { width: 16px; height: 16px; }
    .ios-item-icon.red    { background: var(--red); }
    .ios-item-icon.green  { background: var(--green); }
    .ios-item-icon.orange { background: var(--orange); }
    .ios-item-icon.gray   { background: var(--fill); color: var(--label2); }
    .ios-item-content {
      flex: 1;
      min-width: 0;
    }
    .ios-item-title {
      display: block;
      font-size: 17px;
      color: var(--label);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ios-item-detail {
      display: block;
      font-size: 13px;
      color: var(--label2);
      margin-top: 1px;
    }
    .ios-item-value {
      font-size: 15px;
      color: var(--label2);
      flex-shrink: 0;
    }
    .ios-chevron {
      flex-shrink: 0;
      color: var(--label3);
      transition: transform 0.25s;
    }
    .ios-chevron svg { width: 16px; height: 16px; display: block; }
    .ios-chevron.open { transform: rotate(90deg); }
    .ios-separator {
      height: 0.5px;
      background: var(--separator);
      margin-left: 58px;
    }
    .ios-separator.full { margin-left: 0; }

    /* ── Presets grid ────────────────────────────────────────────────────── */
    .presets-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .preset-btn {
      background: var(--surface);
      border: 1.5px solid transparent;
      border-radius: 14px;
      padding: 14px 12px;
      cursor: pointer;
      text-align: left;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
      min-height: 90px;
      display: flex;
      flex-direction: column;
    }
    .preset-btn:active { background: var(--fill); }
    .preset-btn.active {
      border-color: var(--accent);
      background: rgba(10,132,255,0.08);
    }
    .preset-num {
      font-size: 11px;
      font-weight: 600;
      color: var(--label2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .preset-icon {
      font-size: 28px;
      margin: 6px 0 4px;
      display: block;
      line-height: 1;
    }
    .preset-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--label);
      line-height: 1.25;
    }
    .preset-edit-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: none;
      border: none;
      color: var(--label3);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .preset-edit-btn svg { width: 14px; height: 14px; }
    .preset-edit-btn:active { background: var(--fill); color: var(--label2); }

    /* ── Full-width list button (Sync) ───────────────────────────────────── */
    .ios-action-row {
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    /* ── Bottom sheet ────────────────────────────────────────────────────── */
    .ios-sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: flex-end;
    }
    .ios-sheet-overlay.open { display: flex; }
    .ios-sheet {
      background: var(--sheet-bg);
      border-radius: 20px 20px 0 0;
      padding: 8px 20px calc(32px + env(safe-area-inset-bottom));
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    }
    .ios-sheet-overlay.open .ios-sheet { transform: translateY(0); }
    .ios-sheet-handle {
      width: 36px;
      height: 5px;
      background: var(--label3);
      border-radius: 3px;
      margin: 0 auto 20px;
    }
    .ios-sheet-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--label);
      margin-bottom: 20px;
    }

    /* ── Form elements ───────────────────────────────────────────────────── */
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--label2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-group input {
      width: 100%;
      background: var(--fill);
      border: none;
      color: var(--label);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 17px;
      font-family: inherit;
      outline: none;
      -webkit-appearance: none;
    }
    .form-group input:focus {
      background: var(--fill2);
      box-shadow: 0 0 0 2px var(--accent);
    }
    .form-hint {
      font-size: 13px;
      color: var(--label2);
      line-height: 1.5;
      margin-top: 8px;
    }
    .form-hint a { color: var(--accent); text-decoration: none; }

    /* ── iOS buttons ─────────────────────────────────────────────────────── */
    .ios-btn-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .ios-btn {
      flex: 1;
      min-height: 50px;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      transition: filter 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .ios-btn:active { filter: brightness(0.88); }
    .ios-btn.primary { background: var(--accent); color: #fff; }
    .ios-btn.plain   { background: var(--fill); color: var(--accent); }
    .ios-btn.danger  { background: rgba(255,59,48,0.12); color: var(--red); }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: calc(32px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(50,50,50,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }
    @media (prefers-color-scheme: dark) {
      .toast { background: rgba(90,90,90,0.88); }
    }
    .toast.show { opacity: 1; }

    /* ── Sync result ─────────────────────────────────────────────────────── */
    .sync-result {
      font-size: 13px;
      color: var(--label2);
      padding: 6px 16px 0;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- Navigation bar -->
  <nav class="ios-nav">
    <div class="ios-nav-title">SoundTouch</div>
  </nav>

  <div class="ios-content">

    <div class="error-banner" id="error-banner"></div>

    <!-- Now Playing -->
    <div class="ios-now-playing">
      <div class="np-label">Now Playing</div>
      <div class="np-station-row">
        <span class="status-dot" id="status-dot"></span>
        <span class="np-station" id="np-station">—</span>
      </div>
      <div class="np-meta" id="np-meta"></div>
    </div>

    <!-- Volume -->
    <div class="ios-slider-row">
      <span class="slider-label"><i data-lucide="volume-2"></i> Volume</span>
      <input type="range" id="vol-slider" min="0" max="100" value="30" style="--fill-pct:30%">
      <span class="slider-num" id="vol-num">—</span>
    </div>

    <!-- Bass (shown if device supports it) -->
    <div class="ios-slider-row" id="bass-row" style="display:none">
      <span class="slider-label"><i data-lucide="sliders-horizontal"></i> Bass</span>
      <input type="range" id="bass-slider" min="-9" max="9" value="0" style="--fill-pct:50%">
      <span class="slider-num" id="bass-num">0</span>
    </div>

    <!-- Transport controls -->
    <div class="ios-transport">
      <button class="ios-ctrl-btn" onclick="control('power')" title="Power">
        <i data-lucide="power"></i>
      </button>
      <button class="ios-ctrl-btn" onclick="control('prev')" title="Previous">
        <i data-lucide="skip-back"></i>
      </button>
      <button class="ios-ctrl-btn primary" onclick="control('play_pause')" title="Play / Pause">
        <i data-lucide="play"></i>
      </button>
      <button class="ios-ctrl-btn" onclick="control('next')" title="Next">
        <i data-lucide="skip-forward"></i>
      </button>
      <button class="ios-ctrl-btn" onclick="control('mute')" title="Mute">
        <i data-lucide="volume-x"></i>
      </button>
    </div>

    <!-- Radio Presets -->
    <div class="ios-section">
      <div class="ios-section-header">Radio Presets</div>
      <div class="presets-grid" id="presets-grid"></div>
    </div>

    <!-- Sync to device buttons -->
    <div class="ios-action-row">
      <button class="ios-list-item tappable" id="sync-btn" onclick="syncHardwarePresets()" style="width:100%">
        <span class="ios-item-icon"><i data-lucide="smartphone"></i></span>
        <div class="ios-item-content">
          <span class="ios-item-title">Sync to Device Buttons</span>
          <span class="ios-item-detail">Writes presets into the 6 physical buttons</span>
        </div>
        <span class="ios-chevron"><i data-lucide="chevron-right"></i></span>
      </button>
    </div>
    <div class="sync-result" id="sync-result" style="display:none;margin-top:-20px;margin-bottom:28px"></div>

    <!-- Reconnect device (shown only when device is unreachable) -->
    <div class="ios-action-row" id="reconnect-row" style="display:none">
      <button class="ios-list-item tappable" id="reconnect-btn" onclick="reconnectDevice()" style="width:100%">
        <span class="ios-item-icon" style="background:#FF9500"><i data-lucide="refresh-cw"></i></span>
        <div class="ios-item-content">
          <span class="ios-item-title">Find / Reconnect Device</span>
          <span class="ios-item-detail">Use after a factory reset or if the device IP changed</span>
        </div>
        <span class="ios-chevron"><i data-lucide="chevron-right"></i></span>
      </button>
    </div>
    <div class="sync-result" id="reconnect-result" style="display:none;margin-top:-20px;margin-bottom:8px"></div>
    <!-- Manual IP entry (shown only when auto-discovery fails) -->
    <div id="reconnect-manual" style="display:none;margin-top:-12px;margin-bottom:28px;padding:0 0 0 0">
      <div style="display:flex;gap:8px;padding:0 16px 16px">
        <input type="text" id="reconnect-ip" placeholder="e.g. 192.168.1.62"
               style="flex:1;background:var(--fill);border:none;color:var(--label);border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none">
        <button class="ios-btn primary" onclick="reconnectDeviceManual()" style="min-height:44px;font-size:15px;white-space:nowrap">Connect</button>
      </div>
    </div>

    <!-- Other Sources -->
    <div class="ios-section">
      <div class="ios-section-header">Other Sources</div>
      <div class="ios-list-group">
        <div class="ios-list-item tappable" onclick="control('aux')">
          <span class="ios-item-icon gray"><i data-lucide="plug"></i></span>
          <div class="ios-item-content">
            <span class="ios-item-title">AUX Input</span>
          </div>
          <span class="ios-chevron"><i data-lucide="chevron-right"></i></span>
        </div>
        <div class="ios-separator"></div>
        <div class="ios-list-item tappable" onclick="control('bluetooth')">
          <span class="ios-item-icon" style="background:#5856D6"><i data-lucide="bluetooth"></i></span>
          <div class="ios-item-content">
            <span class="ios-item-title">Bluetooth</span>
          </div>
          <span class="ios-chevron"><i data-lucide="chevron-right"></i></span>
        </div>
      </div>
    </div>

  </div><!-- .ios-content -->

  <!-- Bottom sheet — preset editor -->
  <div class="ios-sheet-overlay" id="modal-overlay">
    <div class="ios-sheet">
      <div class="ios-sheet-handle"></div>
      <div class="ios-sheet-title">Edit Preset <span id="modal-preset-num"></span></div>

      <div class="form-group">
        <label>Station Name</label>
        <input type="text" id="edit-name" placeholder="e.g. BBC Radio 4" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Stream URL</label>
        <input type="url" id="edit-stream-url" placeholder="https://stream.example.com/radio.mp3" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Icon (emoji)</label>
        <input type="text" id="edit-icon" placeholder="📻" maxlength="4" autocomplete="off">
      </div>

      <p class="form-hint">
        Paste any public HTTP or HTTPS MP3/AAC stream URL.<br>
        Find streams at <a href="https://www.radio-browser.info" target="_blank">radio-browser.info</a>
      </p>

      <div class="ios-btn-row">
        <button class="ios-btn plain" onclick="closeModal()">Cancel</button>
        <button class="ios-btn primary" onclick="savePreset()">Save &amp; Play</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  let presets          = [];
  let editingId        = null;
  let volTimer         = null;
  let bassTimer        = null;
  let bassAvailable    = false;
  let bassMin          = -9, bassMax = 9;
  let activePresetId   = null;

  // ── init ──────────────────────────────────────────────────────────────────

  async function init() {
    await Promise.all([loadStatus(), loadPresets(), loadBass()]);
    connectSSE();
    setInterval(loadStatus, 30000);
    lucide.createIcons();
  }

  // ── API helper ────────────────────────────────────────────────────────────
  // Paths are relative so they resolve under the Ingress <base href>.
  // Home Assistant Ingress handles authentication — no app-level token.

  async function api(path, opts = {}) {
    const headers = {
      "Content-Type": "application/json",
      ...(opts.headers || {}),
    };
    const r = await fetch(path, { ...opts, headers });
    const text = await r.text();
    try {
      return JSON.parse(text);
    } catch (_) {
      throw new Error(`Server returned ${r.status}: ${text.slice(0, 120)}`);
    }
  }

  function showError(msg) {
    const b = document.getElementById("error-banner");
    b.textContent = msg;
    b.classList.add("show");
    setTimeout(() => b.classList.remove("show"), 5000);
  }

  function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  }

  // ── SSE ───────────────────────────────────────────────────────────────────

  function connectSSE() {
    // Resolve the SSE URL against <base> so it works behind Ingress.
    const url = new URL("api/events", document.baseURI).href;
    const es = new EventSource(url);
    es.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === "nowPlaying") applyNowPlaying(msg.data);
      if (msg.type === "volume")     applyVolume(msg.data);
      if (msg.type === "error")      showError(msg.data.message);
    };
  }

  // ── Now playing ───────────────────────────────────────────────────────────

  function applyNowPlaying(np) {
    const isPlaying = np.status === "PLAY_STATE" || np.status === "BUFFERING_STATE";

    document.getElementById("status-dot").className =
      "status-dot" + (isPlaying ? " playing" : "");

    const station = np.station || np.content_item?.name || "—";
    const icon    = np.icon ? np.icon + " " : "";
    document.getElementById("np-station").textContent = icon + station;

    const parts = [np.artist, np.track].filter(Boolean);
    document.getElementById("np-meta").textContent =
      parts.length ? parts.join(" — ") : "";

    if (np.preset_id) activePresetId = np.preset_id;
    presets.forEach(p => {
      const el = document.getElementById(`preset-btn-${p.id}`);
      if (el) el.classList.toggle("active", p.id === activePresetId && isPlaying);
    });
  }

  function applyVolume(vol) {
    if (!volTimer) {
      const slider = document.getElementById("vol-slider");
      slider.value = vol.actual;
      slider.style.setProperty("--fill-pct", vol.actual + "%");
      document.getElementById("vol-num").textContent = vol.actual;
    }
  }

  // ── Status ────────────────────────────────────────────────────────────────

  async function loadStatus() {
    const data = await api("api/status");
    const reconnectRow = document.getElementById("reconnect-row");
    if (!data.ok) {
      showError(data.error);
      if (reconnectRow) reconnectRow.style.display = "";
      return;
    }
    if (reconnectRow) reconnectRow.style.display = "none";
    applyNowPlaying(data.now_playing);
    applyVolume(data.volume);
  }


  // ── Presets ───────────────────────────────────────────────────────────────

  const FALLBACK_PRESETS = Array.from({length: 6}, (_, i) => ({
    id: i + 1, name: `Preset ${i + 1}`, stream_url: "", icon: "📻"
  }));

  async function loadPresets() {
    try {
      const data = await api("api/presets");
      presets = (data.virtual && data.virtual.length) ? data.virtual : FALLBACK_PRESETS;
    } catch {
      presets = FALLBACK_PRESETS;
    }
    renderPresets();
  }

  function renderPresets() {
    const grid = document.getElementById("presets-grid");
    grid.innerHTML = "";
    presets.forEach(p => {
      const btn = document.createElement("button");
      btn.className = "preset-btn";
      btn.id = `preset-btn-${p.id}`;
      if (p.id === activePresetId) btn.classList.add("active");
      btn.innerHTML = `
        <span class="preset-num">Preset ${p.id}</span>
        <span class="preset-icon">${p.icon || "📻"}</span>
        <span class="preset-name">${esc(p.name)}</span>
        <button class="preset-edit-btn" data-id="${p.id}" title="Edit">
          <i data-lucide="pencil"></i>
        </button>
      `;
      btn.addEventListener("click", e => {
        if (e.target.closest(".preset-edit-btn")) {
          openEdit(p.id, e);
        } else {
          playPreset(p.id);
        }
      });
      grid.appendChild(btn);
    });
    lucide.createIcons();
  }

  async function playPreset(id) {
    const p = presets.find(x => x.id === id);
    if (!p?.stream_url) { toast("Tap ✏️ to configure this preset"); return; }
    activePresetId = id;
    presets.forEach(q => {
      const el = document.getElementById(`preset-btn-${q.id}`);
      if (el) el.classList.toggle("active", q.id === id);
    });
    document.getElementById("np-station").textContent = (p.icon || "📻") + " " + p.name;
    document.getElementById("status-dot").className = "status-dot playing";
    toast(`Playing ${p.name}…`);
    const data = await api(`api/preset/${id}/play`, { method: "POST" });
    if (!data.ok) showError(data.error);
    else setTimeout(loadStatus, 1500);
  }

  // ── Volume ────────────────────────────────────────────────────────────────

  document.getElementById("vol-slider").addEventListener("input", e => {
    const val = e.target.value;
    document.getElementById("vol-num").textContent = val;
    e.target.style.setProperty("--fill-pct", val + "%");
    clearTimeout(volTimer);
    volTimer = setTimeout(async () => {
      await api("api/volume", {
        method: "POST",
        body: JSON.stringify({ level: parseInt(val) }),
      });
      volTimer = null;
    }, 300);
  });

  // ── Bass ──────────────────────────────────────────────────────────────────

  async function loadBass() {
    const data = await api("api/bass");
    if (!data.ok || !data.caps.available) return;
    bassAvailable = true;
    bassMin = data.caps.min;
    bassMax = data.caps.max;
    const row    = document.getElementById("bass-row");
    const slider = document.getElementById("bass-slider");
    slider.min   = bassMin;
    slider.max   = bassMax;
    slider.value = data.level ?? 0;
    const pct = ((data.level - bassMin) / (bassMax - bassMin) * 100).toFixed(1) + "%";
    slider.style.setProperty("--fill-pct", pct);
    document.getElementById("bass-num").textContent = data.level ?? 0;
    row.style.display = "flex";
  }

  document.getElementById("bass-slider").addEventListener("input", e => {
    const val = e.target.value;
    document.getElementById("bass-num").textContent = val;
    const pct = ((val - bassMin) / (bassMax - bassMin) * 100).toFixed(1) + "%";
    e.target.style.setProperty("--fill-pct", pct);
    clearTimeout(bassTimer);
    bassTimer = setTimeout(async () => {
      await api("api/bass", {
        method: "POST",
        body: JSON.stringify({ level: parseInt(val) }),
      });
      bassTimer = null;
    }, 400);
  });

  // ── Transport controls ────────────────────────────────────────────────────

  async function control(action) {
    const data = await api(`api/control/${action}`, { method: "POST" });
    if (!data.ok) showError(data.error);
    else setTimeout(loadStatus, 800);
  }

  // ── Edit modal (bottom sheet) ─────────────────────────────────────────────

  function openEdit(id, e) {
    e.stopPropagation();
    editingId = id;
    const p = presets.find(x => x.id === id) || {};
    document.getElementById("modal-preset-num").textContent = id;
    document.getElementById("edit-name").value       = p.name       || "";
    document.getElementById("edit-stream-url").value = p.stream_url || "";
    document.getElementById("edit-icon").value       = p.icon       || "📻";
    document.getElementById("modal-overlay").classList.add("open");
  }

  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("open");
    editingId = null;
  }

  document.getElementById("modal-overlay").addEventListener("click", e => {
    if (e.target === e.currentTarget) closeModal();
  });

  async function savePreset() {
    const payload = {
      name:       document.getElementById("edit-name").value.trim(),
      stream_url: document.getElementById("edit-stream-url").value.trim(),
      icon:       document.getElementById("edit-icon").value.trim() || "📻",
    };
    if (!payload.name) { alert("Enter a station name"); return; }
    const data = await api(`api/preset/${editingId}/save`, {
      method: "POST",
      body: JSON.stringify(payload),
    });
    if (!data.ok) { showError(data.error); return; }
    closeModal();
    await loadPresets();
    if (payload.stream_url) playPreset(editingId);
  }

  // ── Sync hardware presets ─────────────────────────────────────────────────

  async function syncHardwarePresets() {
    const btn      = document.getElementById("sync-btn");
    const resultEl = document.getElementById("sync-result");
    btn.disabled = true;
    resultEl.style.display = "none";
    try {
      const data = await api("api/sync-hardware-presets", { method: "POST" });
      if (!data.ok) { showError(data.error || "Sync failed"); return; }
      const ok  = data.results.filter(r => r.ok).length;
      const bad = data.results.filter(r => !r.ok);
      let msg = `✅ ${ok} preset${ok !== 1 ? "s" : ""} written to device buttons.`;
      if (bad.length) msg += `  ⚠️ ${bad.map(r => `#${r.id}: ${r.reason}`).join(", ")}`;
      resultEl.textContent    = msg;
      resultEl.style.display  = "block";
      toast("Device buttons updated!");
    } catch (e) {
      showError("Sync failed: " + e.message);
    } finally {
      btn.disabled = false;
    }
  }

  // ── Device reconnect ─────────────────────────────────────────────────────

  async function _doReconnect(host) {
    const btn      = document.getElementById("reconnect-btn");
    const resultEl = document.getElementById("reconnect-result");
    const manualEl = document.getElementById("reconnect-manual");
    btn.disabled = true;
    resultEl.style.display = "none";
    manualEl.style.display = "none";
    const origTitle  = btn.querySelector(".ios-item-title").textContent;
    const origDetail = btn.querySelector(".ios-item-detail").textContent;
    btn.querySelector(".ios-item-title").textContent  = host ? `Connecting to ${host}…` : "Scanning for device…";
    btn.querySelector(".ios-item-detail").textContent = "";
    try {
      const body = host ? JSON.stringify({ host }) : undefined;
      const data = await api("api/device/reconnect", {
        method: "POST",
        headers: body ? { "Content-Type": "application/json" } : {},
        body,
      });
      if (!data.ok) {
        resultEl.textContent   = "⚠️ " + (data.error || "Device not found.");
        resultEl.style.display = "block";
        manualEl.style.display = "block";
        return;
      }
      resultEl.textContent   = `✅ Connected to ${data.host} — resyncing presets…`;
      resultEl.style.display = "block";
      toast("Device reconnected!");
      setTimeout(() => { resultEl.style.display = "none"; }, 8000);
    } catch (e) {
      resultEl.textContent   = "⚠️ " + e.message;
      resultEl.style.display = "block";
      manualEl.style.display = "block";
    } finally {
      btn.disabled = false;
      btn.querySelector(".ios-item-title").textContent  = origTitle;
      btn.querySelector(".ios-item-detail").textContent = origDetail;
    }
  }

  function reconnectDevice()       { _doReconnect(null); }
  function reconnectDeviceManual() {
    const ip = document.getElementById("reconnect-ip").value.trim();
    if (!ip) return;
    _doReconnect(ip);
  }

  // ── Utilities ─────────────────────────────────────────────────────────────

  function esc(s) {
    return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  init();
</script>
</body>
</html>
