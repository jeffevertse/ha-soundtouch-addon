name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -r soundtouch/requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check soundtouch/app soundtouch/tests
      - name: Tests (pytest)
        working-directory: soundtouch
        run: pytest -q

  addon-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Home Assistant add-on linter
        uses: frenck/action-addon-linter@v2
        with:
          path: "./soundtouch"

  dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: soundtouch/Dockerfile
          failure-threshold: error
